name: Tests

# 触发：PR / 手动 / 每日 cron
# 不用 push 因为 sheldonlidev 被 shadow ban
on:
  pull_request:
    branches: [dev, master]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC 错开 web 项目

jobs:
  python-tests:
    name: pytest (book_index_manager)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          pip install -e .
          pip install pytest
      - name: Run pytest
        run: pytest tests/ -v

  ui-unit:
    name: vitest (ui/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - name: Install
        working-directory: ui
        run: npm ci
      - name: Test
        working-directory: ui
        run: npm test
